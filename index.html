<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Nefiss — Lezzetin Adresi</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;background:#f5f5f5}
input:focus,textarea:focus{outline:none}
::-webkit-scrollbar{display:none}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff;position:relative;overflow-x:hidden}
.header{padding:16px 20px 0;background:linear-gradient(180deg,#FFF9F5 0%,#fff 100%)}
.logo{font-size:30px;font-weight:900;letter-spacing:-1px}.logo span{color:#FF6B2C}
.greeting{color:#9CA3AF;font-size:13px;margin-top:2px;font-weight:500}
.search-wrap{position:relative;margin-top:18px}
.search-input{width:100%;padding:15px 16px 15px 44px;border-radius:16px;border:2px solid #F3F4F6;font-size:15px;font-weight:500;background:#FAFAFA;color:#1A1A1A;transition:border .2s}
.search-input:focus{border-color:#FF6B2C;background:#fff}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:#E5E7EB;border:none;border-radius:50%;width:22px;height:22px;cursor:pointer;font-size:11px;color:#6B7280;display:none;align-items:center;justify-content:center}
.search-clear.show{display:flex}
.cats{display:flex;gap:8px;margin-top:16px;overflow-x:auto;padding-bottom:4px}
.pill{padding:9px 18px;border-radius:24px;font-size:13px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;flex-shrink:0;background:#F3F4F6;color:#6B7280;transition:all .2s}
.pill.on{background:#FF6B2C;color:#fff}
.sorts{display:flex;gap:6px;margin-top:12px;padding-bottom:16px;flex-wrap:wrap}
.sbtn{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid #F3F4F6;background:#fff;color:#9CA3AF;transition:all .2s}
.sbtn.on{border-color:#FF6B2C;background:#FFF5F0;color:#FF6B2C}
.list{padding:0 20px 100px}
.cntrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.cnt{font-size:13px;color:#9CA3AF;font-weight:600}
.clr{background:none;border:none;cursor:pointer;font-size:12px;font-weight:700;color:#FF6B2C}
.card{border-radius:20px;overflow:hidden;margin-bottom:18px;border:1px solid #F3F4F6;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.03);transition:transform .15s}
.card:active{transform:scale(.98)}
.ccov{position:relative;height:168px;overflow:hidden;background-size:cover;background-position:center;background-color:#F3F4F6}
.cgrad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.5) 0%,rgba(0,0,0,0) 50%)}
.bpro{position:absolute;top:12px;left:12px;background:linear-gradient(135deg,#FF6B2C,#FF8F5C);color:#fff;font-size:11px;font-weight:800;padding:5px 12px;border-radius:10px;box-shadow:0 4px 12px rgba(255,107,44,.3)}
.btm{position:absolute;top:12px;right:12px;background:rgba(0,0,0,.55);color:#fff;font-size:12px;font-weight:700;padding:5px 12px;border-radius:10px}
.bcl{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center}
.bcl span{background:#1F2937;color:#fff;padding:8px 20px;border-radius:12px;font-size:14px;font-weight:700}
.cbot{position:absolute;bottom:12px;left:14px;right:14px;display:flex;align-items:end;justify-content:space-between}
.cnam{font-size:19px;font-weight:800;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.3)}
.crat{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.92);padding:5px 10px;border-radius:10px}
.crat b{font-size:14px;font-weight:800;color:#1A1A1A}.crat small{font-size:11px;color:#9CA3AF}
.cbod{padding:14px 16px 16px}
.tgs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tg{font-size:11px;font-weight:600;padding:4px 10px;border-radius:8px;background:#F9FAFB;color:#6B7280}
.mrow{display:flex;align-items:center;justify-content:space-between}
.met{display:flex;align-items:center;gap:14px;font-size:12px;color:#9CA3AF;font-weight:600}
.met b{color:#1A1A1A;font-weight:700}.met .fr{color:#059669;font-weight:700}
.arr{width:34px;height:34px;border-radius:10px;background:#FFF5F0;color:#FF6B2C;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700}
.adr{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;color:#D1D5DB;font-weight:500}
.adr span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* PAGES */
.pg{position:fixed;top:0;left:50%;width:100%;max-width:480px;height:100vh;background:#fff;transition:transform .3s ease;overflow-y:auto;margin-left:-240px}
@media(max-width:480px){.pg{left:0;margin-left:0}}
.pg.z5{z-index:50}.pg.z7{z-index:70}.pg.z8{z-index:80}.pg.z9{z-index:90}
.pg{transform:translateX(100%)}.pg.open{transform:translateX(0)}

.mhero{position:relative;height:200px;background-size:cover;background-position:center;background-color:#F3F4F6}
.mhgrad{position:absolute;inset:0;background:linear-gradient(0deg,rgba(0,0,0,.6) 0%,rgba(0,0,0,.1) 40%)}
.bbk{position:absolute;top:12px;left:12px;background:rgba(255,255,255,.9);border:none;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:22px;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:2}
.mhinf{position:absolute;bottom:16px;left:16px;right:16px;color:#fff}
.mhnam{font-size:24px;font-weight:800;text-shadow:0 1px 6px rgba(0,0,0,.3)}
.mhmet{display:flex;gap:14px;margin-top:8px;font-size:13px;font-weight:600}
.mcats{display:flex;gap:8px;padding:16px 20px;overflow-x:auto;border-bottom:1px solid #F3F4F6;position:sticky;top:0;background:#fff;z-index:10}
.mcat{padding:8px 16px;border-radius:20px;font-size:13px;font-weight:700;border:none;cursor:pointer;white-space:nowrap;background:#F3F4F6;color:#6B7280;transition:all .2s}
.mcat.on{background:#FF6B2C;color:#fff}
.msec{padding:0 20px}
.mstit{font-size:14px;font-weight:800;color:#9CA3AF;text-transform:uppercase;letter-spacing:1px;padding:20px 0 12px;border-bottom:1px solid #F9FAFB}
.mitm{display:flex;justify-content:space-between;align-items:center;padding:16px 0;border-bottom:1px solid #F5F5F5}
.minf{flex:1;margin-right:12px}
.mnam{font-weight:600;font-size:15px;color:#1A1A1A;display:flex;align-items:center;gap:6px}
.mpop{font-size:10px;background:#FFF5F0;color:#FF6B2C;padding:2px 6px;border-radius:6px;font-weight:700}
.mdsc{font-size:13px;color:#9CA3AF;margin-top:4px}
.mpr{display:flex;align-items:center;gap:8px;margin-top:6px}
.mprc{font-weight:800;font-size:16px;color:#FF6B2C}
.mcal{font-size:11px;color:#CCC}
.mhlth{color:#16A34A;font-size:12px}
.abtn{background:#FF6B2C;border:none;color:#fff;border-radius:14px;padding:10px 20px;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(255,107,44,.3);white-space:nowrap}
.abtn:active{transform:scale(.95)}
.qc{display:flex;align-items:center;gap:4px;background:#FFF5F0;border-radius:14px;padding:6px 4px;border:2px solid #FF6B2C}
.qb{background:none;border:none;cursor:pointer;color:#FF6B2C;padding:4px 10px;font-size:18px;font-weight:700}
.qn{font-weight:800;font-size:15px;min-width:24px;text-align:center;color:#FF6B2C}
.cbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;padding:12px 20px 20px;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid #F0F0F0;z-index:60;display:none}
.cbar.show{display:block}
.cbb{width:100%;padding:16px;border-radius:16px;background:linear-gradient(135deg,#FF6B2C,#FF8F5C);border:none;color:#fff;font-size:16px;font-weight:700;cursor:pointer;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 20px rgba(255,107,44,.4)}
.cbg{background:rgba(255,255,255,.2);border-radius:10px;padding:4px 12px;font-size:14px}

/* CART */
.chd{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:1px solid #F3F4F6}
.chd h2{font-size:22px;font-weight:800}
.ci{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #F5F5F5}
.cin{font-weight:600;font-size:15px;color:#1A1A1A}
.cip{font-weight:800;font-size:16px;color:#FF6B2C;margin-top:4px}
.csum{margin:20px;background:#FAFAFA;border-radius:20px;padding:20px}
.crow{display:flex;justify-content:space-between;margin-bottom:10px;font-size:14px;color:#666}
.ctot{display:flex;justify-content:space-between;padding-top:14px;border-top:2px solid #F0F0F0}
.ctot span:first-child{font-size:18px;font-weight:800;color:#1A1A1A}
.ctot span:last-child{font-size:22px;font-weight:900;color:#FF6B2C}

/* ADDRESS INPUT */
.addr-sec{padding:0 20px;margin-top:16px}
.addr-label{font-size:12px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.addr-input{width:100%;padding:14px 16px;border-radius:14px;border:2px solid #F3F4F6;font-size:14px;background:#FAFAFA;color:#1A1A1A;resize:none;font-family:inherit}
.addr-input:focus{border-color:#FF6B2C}
.note-input{width:100%;padding:12px 16px;border-radius:14px;border:2px solid #F3F4F6;font-size:13px;background:#FAFAFA;color:#1A1A1A;resize:none;font-family:inherit;margin-top:12px}

.obtn{width:calc(100% - 40px);margin:16px 20px 30px;padding:18px;border-radius:16px;background:linear-gradient(135deg,#FF6B2C,#FF8F5C);border:none;color:#fff;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,44,.4)}
.obtn:disabled{opacity:.5;cursor:default}
.obtn:active:not(:disabled){transform:scale(.98)}

/* SUCCESS */
.succ{text-align:center;padding:60px 24px}
.succ-icon{width:80px;height:80px;border-radius:50%;background:#D1FAE5;display:inline-flex;align-items:center;justify-content:center;font-size:40px;margin-bottom:20px}
.succ h2{font-size:24px;font-weight:800;color:#1A1A1A}
.succ .num{font-size:28px;font-weight:900;color:#FF6B2C;margin:12px 0}
.succ p{font-size:14px;color:#9CA3AF;margin-top:8px;line-height:1.6}
.succ-btn{display:inline-block;margin-top:24px;padding:14px 32px;border-radius:14px;background:#FF6B2C;color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer}
.succ-btn2{display:inline-block;margin-top:12px;padding:12px 24px;border-radius:14px;background:#F3F4F6;color:#6B7280;border:none;font-size:14px;font-weight:600;cursor:pointer}

/* ORDER HISTORY */
.ohdr{padding:16px 20px;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;gap:12px}
.ohdr h2{font-size:20px;font-weight:800}
.ocard{margin:12px 20px;border-radius:16px;border:1px solid #F3F4F6;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.03)}
.ocard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.ocard-num{font-weight:800;font-size:14px;color:#1A1A1A}
.ocard-date{font-size:12px;color:#9CA3AF}
.ocard-status{font-size:12px;font-weight:700;padding:4px 10px;border-radius:8px}
.st-pending{background:#FEF3C7;color:#D97706}
.st-confirmed{background:#DBEAFE;color:#2563EB}
.st-preparing{background:#FFF5F0;color:#FF6B2C}
.st-on_the_way{background:#E0E7FF;color:#4F46E5}
.st-delivered{background:#D1FAE5;color:#059669}
.st-cancelled{background:#FEE2E2;color:#DC2626}
.ocard-items{font-size:13px;color:#6B7280;margin-bottom:8px}
.ocard-total{font-size:18px;font-weight:800;color:#FF6B2C}
.ocard-rest{font-size:13px;font-weight:600;color:#1A1A1A;margin-bottom:4px}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(255,255,255,.95);backdrop-filter:blur(12px);border-top:1px solid #F0F0F0;display:flex;justify-content:space-around;padding:8px 0 14px;z-index:40}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 16px;color:#CCC;position:relative}
.bnav-item.on{color:#FF6B2C}
.bnav-item span:first-child{font-size:22px}
.bnav-item span:last-child{font-size:11px;font-weight:600}
.bnav-badge{position:absolute;top:-2px;right:6px;background:#FF6B2C;color:#fff;font-size:10px;font-weight:800;border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center}

.sbox{margin:24px 20px;padding:16px;border-radius:16px;background:#F9FAFB;border:1px solid #F3F4F6;text-align:center}
.sbox p{font-size:12px;font-weight:600;color:#9CA3AF}
.ok{color:#059669}.er{color:#FF6B2C}
.emp{text-align:center;padding:48px 20px}.emp .ic{font-size:56px}.emp h3{font-size:17px;font-weight:700;color:#1A1A1A;margin-top:16px}.emp p{font-size:14px;color:#9CA3AF;margin-top:8px}

/* CANLI TAKİP */
.track-wrap{padding:0 0 100px}
.track-hero{background:linear-gradient(135deg,#FF6B2C,#FF8F5C);padding:28px 24px;color:#fff;position:relative}
.track-num{font-size:13px;font-weight:700;opacity:.8}
.track-rest{font-size:20px;font-weight:900;margin-top:4px}
.track-total{font-size:15px;font-weight:700;opacity:.9;margin-top:4px}
.track-steps{padding:28px 20px 0;position:relative}
.track-line{position:absolute;left:35px;top:40px;bottom:20px;width:2px;background:#F0F0F0;z-index:0}
.track-line-fill{position:absolute;left:35px;top:40px;width:2px;background:linear-gradient(180deg,#FF6B2C,#FF8F5C);z-index:1;transition:height 1s ease}
.track-step{display:flex;align-items:flex-start;gap:16px;margin-bottom:28px;position:relative;z-index:2}
.track-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .5s;border:2px solid #E5E7EB;background:#fff}
.track-dot.done{background:#FF6B2C;border-color:#FF6B2C;color:#fff;box-shadow:0 4px 12px rgba(255,107,44,.3)}
.track-dot.active{background:#FFF5F0;border-color:#FF6B2C;animation:tpulse 1.5s infinite}
@keyframes tpulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,44,.4)}50%{box-shadow:0 0 0 8px rgba(255,107,44,0)}}
.track-info{padding-top:4px}
.track-label{font-size:14px;font-weight:800;color:#1A1A1A}
.track-label.dim{color:#9CA3AF}
.track-time{font-size:12px;color:#9CA3AF;margin-top:2px}
.track-eta{margin:0 20px 20px;padding:16px;border-radius:16px;background:#FFF5F0;border:1.5px solid #FFE4D5;display:flex;align-items:center;gap:12px}
.track-eta-icon{font-size:28px}
.track-eta-text{font-size:13px;color:#FF6B2C;font-weight:700}
.track-eta-sub{font-size:11px;color:#FFA07A;margin-top:2px}
.track-items-box{margin:0 20px 20px;border-radius:16px;border:1px solid #F3F4F6;overflow:hidden}
.track-items-head{padding:14px 16px;background:#FAFAFA;font-size:12px;font-weight:800;color:#9CA3AF;text-transform:uppercase;letter-spacing:.5px}
.track-item{padding:12px 16px;border-bottom:1px solid #F5F5F5;display:flex;justify-content:space-between;font-size:14px}
.track-item:last-child{border:none}
.track-refresh{margin:0 20px 20px;padding:12px;border-radius:14px;border:1.5px solid #F3F4F6;background:#fff;color:#9CA3AF;font-size:13px;font-weight:700;cursor:pointer;width:calc(100% - 40px);display:flex;align-items:center;justify-content:center;gap:6px}
.track-refresh:active{background:#F5F5F5}
.ntf{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:12px;font-size:13px;font-weight:700;z-index:9999;color:#fff;max-width:340px;background:#FF6B2C;opacity:0;transition:opacity .3s;pointer-events:none}
.ntf.show{opacity:1}

/* PULL TO REFRESH */
.ptr-indicator{position:fixed;top:0;left:50%;transform:translateX(-50%);width:44px;height:44px;border-radius:50%;background:#FF6B2C;display:flex;align-items:center;justify-content:center;z-index:8888;opacity:0;transition:opacity .2s,top .2s;box-shadow:0 4px 16px rgba(255,107,44,.4);pointer-events:none}
.ptr-indicator.visible{opacity:1}
.ptr-indicator svg{width:22px;height:22px;transition:transform .3s}
.ptr-indicator.ready svg{transform:rotate(180deg)}
.ptr-spinner{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* YASAL MODAL */
.legal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:10000;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.legal-overlay.open{opacity:1;pointer-events:all}
.legal-sheet{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:480px;max-height:88vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s cubic-bezier(.4,0,.2,1)}
.legal-overlay.open .legal-sheet{transform:translateY(0)}
.legal-sheet-handle{width:40px;height:4px;background:#E5E7EB;border-radius:2px;margin:12px auto 0}
.legal-sheet-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.legal-sheet-title{font-size:17px;font-weight:800;color:#1A1A1A}
.legal-sheet-close{background:#F3F4F6;border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.legal-sheet-body{overflow-y:auto;padding:0 20px 32px;font-size:13px;color:#374151;line-height:1.8}
.legal-sheet-body h3{font-size:14px;font-weight:800;color:#1A1A1A;margin:18px 0 6px}
.legal-sheet-body p{margin-bottom:10px}
.legal-sheet-body ul{padding-left:18px;margin-bottom:10px}
.legal-sheet-body li{margin-bottom:4px}

/* ÖDEME LOGOLARI */
.pay-logos{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;flex-wrap:wrap}
.pay-logo{height:24px;border-radius:6px;object-fit:contain;opacity:.7}
.pay-logo-wrap{display:flex;align-items:center;gap:8px;padding:8px 16px;background:#FAFAFA;border-radius:12px;border:1px solid #F0F0F0}
.pay-logo-text{font-size:10px;font-weight:800;padding:3px 8px;border-radius:6px}
.pay-logo-iyzico{background:#FF6B2C;color:#fff}
.pay-logo-visa{background:#1A1F71;color:#fff}
.pay-logo-mc{background:#EB001B;color:#fff}
.pay-logo-troy{background:#005F9E;color:#fff}
.pay-secure-note{text-align:center;font-size:11px;color:#9CA3AF;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:4px}

/* FOOTER */
.app-footer{padding:24px 20px 120px;border-top:1px solid #F3F4F6;margin-top:8px}
.footer-links{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:12px}
.footer-link{font-size:11px;color:#9CA3AF;font-weight:600;cursor:pointer;text-decoration:underline;text-underline-offset:3px;background:none;border:none;font-family:inherit}
.footer-link:hover{color:#FF6B2C}
.footer-copy{text-align:center;font-size:11px;color:#D1D5DB}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fi{animation:fi .4s ease forwards;opacity:0}

/* LOGIN SCREEN */
.login-wrap{position:fixed;inset:0;background:#fff;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{width:100%;max-width:400px}
.login-logo{font-size:42px;font-weight:900;letter-spacing:-2px;margin-bottom:8px}.login-logo span{color:#FF6B2C}
.login-sub{font-size:14px;color:#9CA3AF;font-weight:500;margin-bottom:36px}
.login-label{font-size:12px;font-weight:700;color:#6B7280;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block}
.login-input{width:100%;padding:16px 18px;border-radius:16px;border:2px solid #F3F4F6;font-size:16px;font-weight:500;background:#FAFAFA;color:#1A1A1A;margin-bottom:16px;font-family:inherit}
.login-input:focus{border-color:#FF6B2C;background:#fff}
.login-btn{width:100%;padding:18px;border-radius:16px;background:linear-gradient(135deg,#FF6B2C,#FF8F5C);border:none;color:#fff;font-size:17px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(255,107,44,.4);margin-top:8px}

function fmtCard(el){
  let v=el.value.replace(/\D/g,"").slice(0,16);
  el.value=v.replace(/(.{4})/g,"$1 ").trim();
  // Kart tipi tespiti
  const n=v.replace(/\s/g,"");
  const icon=document.getElementById("cardTypeIcon");
  if(icon){
    if(/^4/.test(n))icon.textContent="💳 Visa";
    else if(/^5[1-5]/.test(n))icon.textContent="💳 Mastercard";
    else if(/^9792/.test(n))icon.textContent="💳 Troy";
    else icon.textContent="💳";
  }
}

function fmtExp(el){
  let v=el.value.replace(/\D/g,"");
  if(v.length>=2)v=v.slice(0,2)+"/"+v.slice(2,4);
  el.value=v;
}

// Kart formu validasyonu
function validateCard(){
  const num=(document.getElementById("cardNumber")?.value||"").replace(/\s/g,"");
  const exp=document.getElementById("cardExp")?.value||"";
  const cvv=document.getElementById("cardCvv")?.value||"";
  const name=document.getElementById("cardName")?.value?.trim()||"";
  if(!name){nf("Kart üzerindeki ismi girin");return false}
  if(num.length<16){nf("Geçerli bir kart numarası girin");return false}
  if(!exp.match(/^\d{2}\/\d{2}$/)){nf("Son kullanma tarihi AA/YY formatında olmalı");return false}
  if(cvv.length<3){nf("CVV eksik");return false}
  const[mm,yy]=exp.split("/");
  const now=new Date();
  const expDate=new Date(2000+parseInt(yy),parseInt(mm)-1,1);
  if(expDate<now){nf("Kartın süresi dolmuş");return false}
  return true;
}

function check3DSCallback(){
  const params=new URLSearchParams(window.location.search);
  if(params.get("payment")==="success"){
    clearInterval(window._3dsCheckInterval);
    document.getElementById("overlay3ds")?.remove();
    const orderId=params.get("orderId");
    // URL'yi temizle
    window.history.replaceState({},"",window.location.pathname);
    handle3DSSuccess(orderId);
  } else if(params.get("payment")==="fail"){
    clearInterval(window._3dsCheckInterval);
    document.getElementById("overlay3ds")?.remove();
    window.history.replaceState({},"",window.location.pathname);
    orderLoading=false;rC();
    nf("Ödeme başarısız: "+(params.get("msg")||"Bilinmeyen hata"));
  }
}

// URL'de payment callback var mı kontrol et (sayfa açılışında)
function checkPaymentCallback(){
  const params=new URLSearchParams(window.location.search);
  const payStatus=params.get("payment");
  if(!payStatus)return;
  window.history.replaceState({},"",window.location.pathname);
  
  if(payStatus==="success"){
    const orderId=params.get("orderId");
    const paymentId=params.get("paymentId");
    // Edge Function zaten Supabase'i güncelledi, biz sadece UI gösteriyoruz
    showPaymentSuccess(orderId,paymentId);
  } else if(payStatus==="fail"){
    const msg=decodeURIComponent(params.get("msg")||"Bilinmeyen hata");
    showPaymentFail(msg);
  }
}

// ═══ ORDER PLACEMENT ═══
async function pO(){
  if(!cart.length)return;
  const addrEl=document.getElementById("addrInput");
  const addr=addrEl?.value?.trim();
  if(!addr){
    nf("Teslimat adresi girin!");
    if(addrEl){addrEl.style.borderColor="#EF4444";addrEl.focus();setTimeout(()=>addrEl.style.borderColor="",2000)}
    return
  }
  const note=document.getElementById("noteInput")?.value?.trim()||"";
  
  // Online kartsa önce validasyon yap
  if(selectedPayMethod==="online"&&!validateCard()){return}
  orderLoading=true;rC();
  
  const rest=RS.find(r=>r.id===crid);
  const subtotal=Math.round(cT()*100); // TL → kuruş
  const delFee=rest?.delivery_fee||0;
  const total=subtotal+delFee;
  const comm=Math.round(subtotal*(rest?.commission||12)/100);

  // Online ödeme: önce sipariş oluştur, sonra ödemeyi başlat
  // 1. Create order
  const custInfo=currentUser&&currentUser.name&&currentUser.name!=="Misafir"
    ?`[${currentUser.name}${currentUser.phone?" • "+currentUser.phone:""}] `:"";
  const realUID=currentUser?.id||DEMO_UID;

  const orderData={
    customer_id:realUID,
    restaurant_id:crid,
    delivery_address:addr,
    subtotal:subtotal,
    delivery_fee:delFee,
    total:total,
    commission_amount:comm,
    payment_method:selectedPayMethod,
    payment_status:"pending",
    iyzico_payment_id:null, // callback'ten sonra doldurulacak
    status:"pending",
    status_history:[{status:"pending",at:new Date().toISOString()}],
    customer_note:(custInfo+(note||"")).trim()||null
  };

  const orderRes=await sPost("orders",orderData);
  
  if(!orderRes||!orderRes.length){
    orderLoading=false;rC();
    nf("Sipariş oluşturulamadı!");
    return
  }

  const order=orderRes[0];

  // 2. Create order items
  const items=cart.map(c=>({
    order_id:order.id,
    menu_item_id:c.id,
    name:c.name,
    quantity:c.qty,
    unit_price:Math.round(c.price*100),
    total_price:Math.round(c.price*c.qty*100),
    note:c.itemNote||null
  }));

  await sPost("order_items",items);

  // 3. Ödeme yöntemine göre devam
  if(selectedPayMethod==="online"){
    // İyzico 3DS başlat (Supabase Edge Function üzerinden)
    const html3DS=await startIyzico3DS(order.id,total,addr);
    orderLoading=false;
    if(html3DS){
      // 3DS HTML formunu göster — kullanıcı banka SMS'ini girince
      // İyzico → Edge Function iyzico-callback → Supabase güncelle → frontend yönlendir
      show3DSOverlay(html3DS);
    } else {
      // 3DS başlatılamazsa siparişi iptal et
      await fetch(SB+"/rest/v1/orders?id=eq."+order.id,{
        method:"PATCH",headers:{...HD,"Content-Type":"application/json"},
        body:JSON.stringify({status:"cancelled",payment_status:"failed"})
      }).catch(()=>{});
      rC();
    }
  } else {
    // Kapıda ödeme — direkt başarı
    orderLoading=false;
    const orderNum=order.order_number||"NFS-?????";
    await updateUserAddress(addr);
    cart=[];crid=null;deliveryAddr="";orderNote="";selectedPayMethod="cash";
    document.getElementById("cp").classList.remove("open");
    document.getElementById("cbar").classList.remove("show");
    showSuccess(orderNum,rest?.name||"Restoran",kTL(total),selectedPayMethod||"cash",order.id);
    rNav();
  }
}

// ═══ CANLI SİPARİŞ TAKİP ═══
const TRACK_STEPS=[
  {key:"pending",   icon:"🕐", label:"Sipariş Alındı",     sub:"Restoran onayı bekleniyor"},
  {key:"confirmed", icon:"✅", label:"Sipariş Onaylandı",  sub:"Restoran siparişini gördü"},
  {key:"preparing", icon:"👨‍🍳", label:"Hazırlanıyor",        sub:"Mutfak çalışıyor"},
  {key:"on_the_way",icon:"🛵", label:"Yolda",               sub:"Kurye siparişinizi getiriyor"},
  {key:"delivered", icon:"📦", label:"Teslim Edildi",       sub:"Afiyet olsun!"},
];
const STATUS_ORDER=["pending","confirmed","preparing","on_the_way","delivered"];
let trackOrderId=null;
let trackPollTimer=null;

let realtimeChannel=null;
const STATUS_TOASTS={
  confirmed:"✅ Restoranın siparişini gördü!",
  preparing:"👨‍🍳 Mutfak hazırlamaya başladı!",
  on_the_way:"🛵 Kurye şu an yola çıktı!",
  delivered:"📦 Siparişin teslim edildi! Afiyet olsun 🎉",
  cancelled:"❌ Sipariş iptal edildi."
};

async function openTracking(orderId){
  trackOrderId=orderId;
  const el=document.getElementById("tp");
  el.innerHTML=`<div style="text-align:center;padding:80px 20px"><p style="color:#9CA3AF">Sipariş yükleniyor...</p></div>`;
  el.classList.add("open");
  await refreshTracking();

  // Supabase Realtime: orders tablosunu dinle
  subscribeRealtime(orderId);
}

function subscribeRealtime(orderId){
  // Önceki kanalı temizle
  if(realtimeChannel){
    try{realtimeChannel.socket?.disconnect()}catch(e){}
    realtimeChannel=null;
  }
  // Supabase Realtime WebSocket bağlantısı
  const wsUrl=SB.replace("https://","wss://").replace("http://","ws://")+"/realtime/v1/websocket?apikey="+SK+"&vsn=1.0.0";
  try{
    const ws=new WebSocket(wsUrl);
    realtimeChannel=ws;
    let heartbeat;
    ws.onopen=()=>{
      // Realtime kanalına abone ol
      ws.send(JSON.stringify({
        topic:"realtime:public:orders:id=eq."+orderId,
        event:"phx_join",
        payload:{config:{broadcast:{ack:false},presence:{key:""},postgres_changes:[
          {event:"UPDATE",schema:"public",table:"orders",filter:"id=eq."+orderId}
        ]}},
        ref:"1"
      }));
      heartbeat=setInterval(()=>ws.readyState===1&&ws.send(JSON.stringify({topic:"phoenix",event:"heartbeat",payload:{},ref:"hb"})),25000);
    };
    ws.onmessage=async(e)=>{
      try{
        const msg=JSON.parse(e.data);
        if(msg.event==="postgres_changes"||msg.payload?.data?.type==="UPDATE"){
          const record=msg.payload?.data?.record||msg.payload?.record;
          if(record&&record.id===orderId){
            const newStatus=record.status;
            const toast=STATUS_TOASTS[newStatus];
            if(toast){
              // Animasyonlu toast bildirimi
              showStatusToast(toast,newStatus==="cancelled"?"#EF4444":newStatus==="delivered"?"#22C55E":"#FF6B2C");
            }
            await refreshTracking();
          }
        }
      }catch(err){}
    };
    ws.onerror=()=>{
      // Realtime başarısız → polling'e düş
      clearInterval(heartbeat);
      clearInterval(trackPollTimer);
      trackPollTimer=setInterval(refreshTracking,10000);
    };
    ws.onclose=()=>clearInterval(heartbeat);
  }catch(err){
    // WebSocket desteklenmiyorsa polling
    clearInterval(trackPollTimer);
    trackPollTimer=setInterval(refreshTracking,10000);
  }
}

function showStatusToast(msg,color="#FF6B2C"){
  const el=document.createElement("div");
  el.style.cssText=`position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-20px);padding:14px 24px;border-radius:16px;background:${color};color:#fff;font-size:14px;font-weight:800;z-index:99999;box-shadow:0 8px 32px rgba(0,0,0,.2);transition:all .4s ease;max-width:320px;text-align:center`;
  el.textContent=msg;
  document.body.appendChild(el);
  setTimeout(()=>el.style.transform="translateX(-50%) translateY(0)",10);
  setTimeout(()=>{el.style.opacity="0";setTimeout(()=>el.remove(),400)},3500);
}

function closeTracking(){
  document.getElementById("tp").classList.remove("open");
  clearInterval(trackPollTimer);trackPollTimer=null;
  if(realtimeChannel){
    try{realtimeChannel.close()}catch(e){}
    realtimeChannel=null;
  }
}

async function refreshTracking(){
  if(!trackOrderId)return;
  const data=await sg("orders?id=eq."+trackOrderId+"&select=*,items:order_items(*),restaurant:restaurants(name,cover_url,avg_prep_time)&limit=1");
  const o=data?.[0];
  if(!o)return;
  renderTracking(o);
}

function renderTracking(o){
  const el=document.getElementById("tp");
  const st=o.status||"pending";
  const rest=o.restaurant;
  const isCancelled=st==="cancelled";
  const currentIdx=STATUS_ORDER.indexOf(st);

  // ETA hesapla
  const orderTime=new Date(o.created_at);
  const prepMin=rest?.avg_prep_time||25;
  const etaTime=new Date(orderTime.getTime()+(prepMin+10)*60000);
  const now=new Date();
  const etaMin=Math.max(0,Math.round((etaTime-now)/60000));
  const etaText=etaMin>0?`~${etaMin} dakika içinde`:"Az kaldı!";

  const itemsHTML=(o.items||[]).map(i=>`
    <div class="track-item">
      <span>${i.quantity}× ${i.name}${i.note?` <span style="color:#F97316;font-size:11px">(${i.note})</span>`:""}</span>
      <span style="font-weight:700;color:#FF6B2C">${((i.total_price||0)/100).toLocaleString("tr-TR")} ₺</span>
    </div>`).join("");

  // Adım ilerlemesi
  const stepsHTML=isCancelled?
    `<div style="text-align:center;padding:32px;color:#EF4444"><div style="font-size:48px;margin-bottom:12px">❌</div><div style="font-weight:800;font-size:16px">Sipariş İptal Edildi</div></div>`:
    TRACK_STEPS.map((s,i)=>{
      const idx=STATUS_ORDER.indexOf(s.key);
      const done=currentIdx>=idx;
      const active=currentIdx===idx&&st!=="delivered";
      return `<div class="track-step">
        <div class="track-dot ${done?"done":active?"active":""}">${done?s.icon:i+1}</div>
        <div class="track-info">
          <div class="track-label ${!done&&!active?"dim":""}">${s.label}</div>
          <div class="track-time">${done||active?s.sub:""}</div>
        </div>
      </div>`;
    }).join("");

  const filledSteps=Math.max(0,currentIdx);
  const totalSteps=STATUS_ORDER.length-1;
  const fillPct=isCancelled?0:Math.round((filledSteps/totalSteps)*100);

  el.innerHTML=`
    <div class="track-wrap">
      <div class="track-hero">
        <button class="bbk" style="background:rgba(255,255,255,.2);color:#fff" onclick="closeTracking()">‹</button>
        <div style="padding-left:52px">
          <div class="track-num">${o.order_number||"—"}</div>
          <div class="track-rest">${rest?.name||"Restoran"}</div>
          <div class="track-total">${((o.total||0)/100).toLocaleString("tr-TR")} ₺ • ${
            o.payment_method==="online"?"💳 Online ödendi":
            o.payment_method==="card_door"?"💳 Kapıda kart":"💵 Kapıda nakit"}</div>
        </div>
      </div>

      ${!isCancelled&&st!=="delivered"?`
      <div class="track-eta">
        <div class="track-eta-icon">⏱️</div>
        <div>
          <div class="track-eta-text">${etaText}</div>
          <div class="track-eta-sub">Tahmini teslimat süresi</div>
        </div>
      </div>`:
      st==="delivered"?`<div class="track-eta"><div class="track-eta-icon">🎉</div><div><div class="track-eta-text">Teslim Edildi!</div><div class="track-eta-sub">Afiyet olsun, tekrar bekleriz</div></div></div>`:""}

      <div class="track-steps" style="position:relative">
        <div class="track-line"></div>
        <div class="track-line-fill" style="height:${fillPct}%;max-height:calc(100% - 40px)"></div>
        ${stepsHTML}
      </div>

      <div class="track-items-box">
        <div class="track-items-head">Sipariş Detayı</div>
        ${itemsHTML}
        <div class="track-item" style="background:#FAFAFA;font-weight:800">
          <span>Toplam</span>
          <span style="color:#FF6B2C">${((o.total||0)/100).toLocaleString("tr-TR")} ₺</span>
        </div>
      </div>

      ${o.delivery_address?`<div style="margin:0 20px 12px;display:flex;align-items:center;gap:8px;font-size:13px;color:#9CA3AF"><span>📍</span><span>${o.delivery_address}</span></div>`:""}

      <button class="track-refresh" onclick="refreshTracking()">
        🔄 Güncelle <span id="trackLastUpdate" style="font-size:11px;margin-left:4px"></span>
      </button>
    </div>`;

  document.getElementById("trackLastUpdate").textContent=
    "Son: "+new Date().toLocaleTimeString("tr-TR",{hour:"2-digit",minute:"2-digit",second:"2-digit"});
}

// ═══ PULL TO REFRESH ═══
(function initPTR(){
  let startY=0,currentY=0,isPulling=false,threshold=72;
  const ind=()=>document.getElementById("ptrIndicator");
  const appEl=()=>document.getElementById("app");

  function isAtTop(){
    return (appEl()?.scrollTop||window.scrollY||document.documentElement.scrollTop||0)<=0;
  }
  document.addEventListener("touchstart",e=>{
    if(!isAtTop())return;
    startY=e.touches[0].clientY;isPulling=true;
  },{passive:true});
  document.addEventListener("touchmove",e=>{
    if(!isPulling)return;
    currentY=e.touches[0].clientY;
    const diff=currentY-startY;
    if(diff<=0){ind()&&(ind().style.top="-60px");return}
    const pull=Math.min(diff*0.45,threshold);
    const el=ind();
    if(!el)return;
    el.style.top=(pull-44)+"px";
    el.classList.toggle("visible",pull>20);
    el.classList.toggle("ready",pull>=threshold);
  },{passive:true});
  document.addEventListener("touchend",async()=>{
    if(!isPulling)return;
    isPulling=false;
    const diff=currentY-startY;
    const el=ind();
    if(diff>=threshold&&el){
      // Refresh tetikle
      el.innerHTML=`<svg class="ptr-spinner" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>`;
      el.style.top="12px";
      await init();
      nf("Yenilendi ✓");
    }
    if(el){el.style.top="-60px";el.classList.remove("visible","ready");
      setTimeout(()=>{el.innerHTML=`<svg id="ptrIcon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>`},400)}
    startY=0;currentY=0;
  },{passive:true});
})();
